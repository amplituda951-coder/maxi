<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Порівняння: До → Після</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #f1f5f9 0%, #cbd5e1 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 2000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .page-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-icon {
            font-size: 1.1rem;
        }

        .card-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .card-side {
            padding: 10px;
        }

        .card-side.left {
            background: #fef2f2;
            border-right: 2px solid #e2e8f0;
        }

        .card-side.right {
            background: #f0fdf4;
        }

        .side-label {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .left .side-label {
            color: #dc2626;
        }

        .right .side-label {
            color: #16a34a;
        }

        .side-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .left .side-label .dot {
            background: #dc2626;
        }

        .right .side-label .dot {
            background: #16a34a;
        }

        .side-image {
            background: white;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .side-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-footer {
            padding: 8px 15px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: #64748b;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .print-controls {
                display: none;
            }

            .page-card {
                box-shadow: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }
        }

        @media (max-width: 1400px) {
            .pages-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .pages-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎨 Порівняння версій сайту</h1>
            <p class="subtitle">До → Після</p>
        </header>

        <div class="pages-grid">
            <!-- Головна -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">🏠</span>
                    <span>Головна</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="home до.png" alt="Головна До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="home  після.png" alt="Головна Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 1 з 6</div>
            </div>

            <!-- Пропозиція -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">📦</span>
                    <span>Пропозиція</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="proposal до.png" alt="Пропозиція До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="proposal  після.png" alt="Пропозиція Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 2 з 6</div>
            </div>

            <!-- Пакування -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">📦</span>
                    <span>Пакування</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="packing до.png" alt="Пакування До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="packing  після.png" alt="Пакування Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 3 з 6</div>
            </div>

            <!-- Етикетка -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">🏷️</span>
                    <span>Етикетка</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="label до.png" alt="Етикетка До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="label  після.png" alt="Етикетка Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 4 з 6</div>
            </div>

            <!-- Кар'єра -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">💼</span>
                    <span>Кар'єра</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="career до.png" alt="Кар'єра До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="career  після.png" alt="Кар'єра Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 5 з 6</div>
            </div>

            <!-- Контакти -->
            <div class="page-card">
                <div class="card-header">
                    <span class="card-icon">📞</span>
                    <span>Контакти</span>
                </div>
                <div class="card-comparison">
                    <div class="card-side left">
                        <div class="side-label">
                            <span class="dot"></span>
                            До
                        </div>
                        <div class="side-image">
                            <img src="contacts до.png" alt="Контакти До">
                        </div>
                    </div>
                    <div class="card-side right">
                        <div class="side-label">
                            <span class="dot"></span>
                            Після
                        </div>
                        <div class="side-image">
                            <img src="contacts  після.png" alt="Контакти Після">
                        </div>
                    </div>
                </div>
                <div class="card-footer">Сторінка 6 з 6</div>
            </div>
        </div>
    </div>
</body>

</html>
